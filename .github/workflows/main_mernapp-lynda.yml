name: Build and deploy Node.js app to Azure Web App - mernapp-lynda

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Create startup file
        run: |
          echo "require('./server')" > backend/start.js

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_60CEFF83A4D142EF8173469E4C89B1AA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2BFBCD40664D4910811A9F4BDBE0B622 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2740F715F5BF4F2E8A163BD3BE1C44BB }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mernapp-lynda'
          slot-name: 'Production'
          package: .